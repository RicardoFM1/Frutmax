{% extends 'base.html' %}

{% block extra_css %}
<style>
    .form-container {
        max-width: 800px;
        margin: 0 auto;
    }

    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
        margin-bottom: 2rem;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .form-group label {
        font-weight: 600;
        font-size: 0.9rem;
    }

    .form-control {
        padding: 0.8rem;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.1);
        font-size: 1rem;
        width: 100%;
    }

    .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.1);
    }

    .full-width {
        grid-column: 1 / -1;
    }

    .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 1rem;
        border-top: 1px solid rgba(0,0,0,0.05);
        padding-top: 1.5rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <header>
        <h1>{% if object %}Editar {{ object.nome }}{% else %}Nova Fruta{% endif %}</h1>
        <a href="{% url 'fruta-list' %}" class="btn btn-outline">Voltar</a>
    </header>

    <div class="card">
        <form method="post">
            {% csrf_token %}
            <div class="form-grid">
                <div class="form-group full-width">
                    <label for="id_nome">Nome da Fruta</label>
                    <input type="text" name="nome" id="id_nome" class="form-control" required value="{{ form.nome.value|default:'' }}">
                </div>

                <div class="form-group">
                    <label for="id_categoria">Categoria</label>
                    <select name="categoria" id="id_categoria" class="form-control">
                        {% for choice in form.fields.categoria.queryset %}
                            <option value="{{ choice.pk }}" {% if form.categoria.value == choice.pk %}selected{% endif %}>{{ choice.nome }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="id_preco">Preço (R$)</label>
                    <input type="number" step="0.01" name="preco" id="id_preco" class="form-control" required value="{{ form.preco.value|default:'' }}">
                </div>

                <div class="form-group">
                    <label for="id_quantidade">Quantidade Atual</label>
                    <input type="number" name="quantidade" id="id_quantidade" class="form-control" required value="{{ form.quantidade.value|default:'0' }}">
                </div>

                <div class="form-group">
                    <label for="id_unidade">Unidade</label>
                    <select name="unidade" id="id_unidade" class="form-control">
                        {% for val, label in form.fields.unidade.choices %}
                            <option value="{{ val }}" {% if form.unidade.value == val %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="id_data_validade">Data de Validade</label>
                    <input type="date" name="data_validade" id="id_data_validade" class="form-control" required value="{{ form.data_validade.value|date:'Y-m-d'|default:'' }}">
                </div>

                <div class="form-group">
                    <label for="id_estoque_minimo">Estoque Mínimo</label>
                    <input type="number" name="estoque_minimo" id="id_estoque_minimo" class="form-control" required value="{{ form.estoque_minimo.value|default:'10' }}">
                </div>

                <div class="form-group full-width">
                    <label for="id_fornecedor">Fornecedor</label>
                    <input type="text" name="fornecedor" id="id_fornecedor" class="form-control" value="{{ form.fornecedor.value|default:'' }}">
                </div>

                <div class="form-group full-width">
                    <label for="id_descricao">Descrição</label>
                    <textarea name="descricao" id="id_descricao" class="form-control" rows="3">{{ form.descricao.value|default:'' }}</textarea>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Salvar Alterações</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
